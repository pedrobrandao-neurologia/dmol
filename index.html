<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#1c3836">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>DMOL — Discriminação Mnêmica de Objeto-em-Lugar</title>
<style>
  :root{
    --paper:#f6f4ee; --ink:#1b1c1e; --muted:#6c6e72; --line:#e3e0d7;
    --accent:#2f6f6a; --accent-ink:#173f3b; --accent-soft:#e2efed;
    --stage:#ffffff; --cell:#eeeae1; --cell-line:#ded9cd;
    --danger:#9a3b2f; --ok:#2f6f6a;
    --radius:14px; --maxw:560px;
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{margin:0; padding:0; height:100%}
  body{
    font-family:var(--font); background:var(--paper); color:var(--ink);
    line-height:1.5; -webkit-font-smoothing:antialiased;
    display:flex; justify-content:center;
    padding:env(safe-area-inset-top) 16px env(safe-area-inset-bottom);
    overscroll-behavior:none; touch-action:manipulation;
  }
  #app{width:100%; max-width:var(--maxw); min-height:100dvh; display:flex; flex-direction:column}
  .screen{flex:1; display:flex; flex-direction:column; justify-content:center; align-items:center; gap:20px; padding:20px 4px; text-align:center; animation:fade .25s ease}
  @keyframes fade{from{opacity:0} to{opacity:1}}
  @media (prefers-reduced-motion:reduce){.screen{animation:none} *{transition:none!important}}
  h1{font-size:26px; font-weight:600; letter-spacing:-.01em; margin:0}
  h2{font-size:20px; font-weight:600; margin:0}
  p{margin:0; color:var(--muted); max-width:42ch}
  p.lead{color:var(--ink); font-size:17px}
  .kbd{font-variant-numeric:tabular-nums}
  .badge{display:inline-block; font-size:12px; letter-spacing:.08em; text-transform:uppercase; color:var(--accent-ink); background:var(--accent-soft); padding:4px 10px; border-radius:999px; font-weight:600}
  /* buttons */
  .btn{font:inherit; font-size:17px; font-weight:500; border:1px solid var(--line); background:var(--stage); color:var(--ink); padding:14px 22px; border-radius:var(--radius); cursor:pointer; min-height:52px; min-width:120px; transition:transform .06s ease, background .15s}
  .btn:active{transform:scale(.98)}
  .btn.primary{background:var(--accent); border-color:var(--accent); color:#fff}
  .btn.primary:disabled{opacity:.4; cursor:default}
  .btn.ghost{background:transparent}
  .btn-row{display:flex; gap:12px; flex-wrap:wrap; justify-content:center; width:100%}
  .btn-row .btn{flex:1; min-width:0}
  .choice-row .btn{padding:18px 10px; font-size:18px}
  .fields{display:flex; flex-direction:column; gap:14px; width:100%; max-width:360px; text-align:left}
  label.field{display:flex; flex-direction:column; gap:6px; font-size:14px; color:var(--muted)}
  input[type=text], select{font:inherit; font-size:16px; padding:12px 14px; border:1px solid var(--line); border-radius:12px; background:var(--stage); color:var(--ink)}
  .check{flex-direction:row; align-items:center; gap:10px; color:var(--ink)}
  .check input{width:22px; height:22px; accent-color:var(--accent)}
  /* progress */
  .progress{position:fixed; top:0; left:0; right:0; height:4px; background:transparent}
  .progress > i{display:block; height:100%; background:var(--accent); width:0; transition:width .3s ease}
  .phase-tag{position:fixed; top:12px; right:14px; font-size:12px; color:var(--muted); letter-spacing:.03em}
  /* fixation */
  .fix{font-size:40px; color:var(--muted)}
  /* scene grid */
  .scene{
    display:grid; gap:6px; background:var(--stage);
    grid-template-columns:repeat(var(--cols),1fr);
    grid-template-rows:repeat(var(--rows),1fr);
    aspect-ratio:var(--cols) / var(--rows);
    width:min(100%, calc(60dvh * var(--cols) / var(--rows)));
    height:auto;
    padding:8px; border-radius:16px; border:1px solid var(--line);
  }
  .cell{background:var(--cell); border-radius:10px; border:1px solid var(--cell-line); display:flex; align-items:center; justify-content:center; position:relative; overflow:hidden}
  .cell.clickable{cursor:pointer; transition:background .12s, border-color .12s}
  .cell.clickable:active{background:var(--accent-soft); border-color:var(--accent)}
  .cell.picked{background:var(--accent-soft); border-color:var(--accent)}
  .cell canvas{width:88%; height:88%; max-width:100%; max-height:100%; display:block}
  /* single-object stage */
  .obj-stage{width:min(64vw,240px); height:min(64vw,240px); background:var(--stage); border:1px solid var(--line); border-radius:20px; display:flex; align-items:center; justify-content:center}
  .obj-stage canvas{width:82%; height:82%; max-width:100%; max-height:100%; display:block}
  /* imagens reais (banco MST): mesmo esquema responsivo do canvas */
  .cell img{width:88%; height:88%; max-width:100%; max-height:100%; object-fit:contain; display:block; -webkit-user-drag:none; user-select:none; pointer-events:none}
  .obj-stage img{width:82%; height:82%; max-width:100%; max-height:100%; object-fit:contain; display:block; -webkit-user-drag:none; user-select:none}
  /* distractor numbers */
  .num-row{display:flex; gap:18px; width:100%; max-width:420px}
  .num{flex:1; font-size:44px; font-weight:600; font-variant-numeric:tabular-nums; padding:28px 0; border:1px solid var(--line); border-radius:18px; background:var(--stage); cursor:pointer}
  .num:active{background:var(--accent-soft)}
  /* results */
  .cards{display:grid; grid-template-columns:1fr 1fr; gap:12px; width:100%}
  .card{border:1px solid var(--line); border-radius:14px; background:var(--stage); padding:14px; text-align:left}
  .card .k{font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:.05em}
  .card .v{font-size:28px; font-weight:600; font-variant-numeric:tabular-nums; margin-top:2px}
  .card .s{font-size:12px; color:var(--muted)}
  table.bins{width:100%; border-collapse:collapse; font-size:14px; font-variant-numeric:tabular-nums}
  table.bins th, table.bins td{padding:6px 8px; border-bottom:1px solid var(--line); text-align:center}
  table.bins th{color:var(--muted); font-weight:500}
  .note{font-size:12.5px; color:var(--muted); max-width:44ch}
  .hidden{display:none!important}
  ol.steps{text-align:left; color:var(--muted); max-width:40ch; margin:0; padding-left:20px}
  ol.steps li{margin:6px 0}
</style>
</head>
<body>
<div class="progress"><i id="bar"></i></div>
<div class="phase-tag" id="phaseTag"></div>
<div id="app"><div class="screen" id="screen"></div></div>

<script>
"use strict";

/* ============================================================
   CONFIG — ajuste aqui para casar com a especificação / piloto
   ============================================================ */
const CONFIG = {
  cols: 4, rows: 6,          // grade 4x6 = 24 células (uma por objeto codificado)
  encodeMs: 2500, isiMs: 500,
  nTargets: 12,              // itens repetidos idênticos (viram alvos no teste e no objeto-lugar)
  nLures: 12,                // itens estudados reapresentados como isca semelhante
  nFoils: 12,                // objetos novos
  distractorMs: 45000,
  practiceN: 3,
  poolSize: 60,
  // similaridade: mapeia bin -> magnitude de perturbação (menor = mais parecido)
  binAmount: { 5:0.08, 4:0.15, 3:0.24, 2:0.34, 1:0.46 },
  enableRelational: false,   // Fase 5 opcional (definido na tela inicial)
  relationalTrials: 6,
  interTrialMs: 350
};
const N_ENCODE = CONFIG.nTargets + CONFIG.nLures;      // = 24
const N_CELLS = CONFIG.cols * CONFIG.rows;

/* ============================ utils ============================ */
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
function shuffle(arr, rnd){const a=arr.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(rnd()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function clamp(x,a,b){return Math.max(a,Math.min(b,x));}
const wait = ms => new Promise(r=>setTimeout(r,ms));
const now = () => performance.now();
const $ = id => document.getElementById(id);
function el(tag, cls, txt){const e=document.createElement(tag); if(cls)e.className=cls; if(txt!=null)e.textContent=txt; return e;}
function uuid(){ return (crypto.randomUUID) ? crypto.randomUUID() : 'id-'+Math.random().toString(36).slice(2)+Date.now().toString(36); }

/* ==================== estímulos procedurais ==================== */
// Um "objeto" = vetor de features. Isca = perturbação controlada por bin.
function makeShape(rnd){
  const n = 9;
  const radii = Array.from({length:n}, ()=> 0.72 + rnd()*0.5);
  return {
    radii,
    hue: Math.floor(rnd()*360),
    sat: 52 + rnd()*26,
    light: 46 + rnd()*14,
    pattern: Math.floor(rnd()*3),        // 0 liso, 1 pontos, 2 listras
    patternHue: Math.floor(rnd()*360),
    rot: rnd()*Math.PI*2
  };
}
function perturb(shape, amount, rnd){
  const s = JSON.parse(JSON.stringify(shape));
  s.radii = s.radii.map(r => clamp(r + (rnd()*2-1)*amount*0.6, 0.4, 1.6));
  s.hue = (s.hue + (rnd()*2-1)*amount*60 + 360) % 360;
  s.light = clamp(s.light + (rnd()*2-1)*amount*12, 30, 66);
  s.rot = s.rot + (rnd()*2-1)*amount*0.5;
  if (amount > 0.28 && rnd() < 0.5) s.pattern = (s.pattern + 1) % 3;  // só iscas fortes trocam textura
  return s;
}
function roundnessOf(shape){ // variância dos raios: baixa = arredondado
  const m = shape.radii.reduce((a,b)=>a+b,0)/shape.radii.length;
  const v = shape.radii.reduce((a,b)=>a+(b-m)*(b-m),0)/shape.radii.length;
  return v; // maior = mais "pontudo"
}
function renderShape(shape, sizeCss){
  const dpr = Math.min(window.devicePixelRatio||1, 3);
  const c = document.createElement('canvas');
  c.width = Math.round(sizeCss*dpr); c.height = Math.round(sizeCss*dpr);
  // O tamanho exibido é controlado pelo CSS do contêiner (.cell / .obj-stage),
  // para escalar de forma responsiva. sizeCss define apenas a resolução do
  // backing store (nitidez) e o sistema de coordenadas do desenho.
  const ctx = c.getContext('2d'); ctx.scale(dpr,dpr);
  const cx=sizeCss/2, cy=sizeCss/2, R=sizeCss*0.42;
  const n=shape.radii.length;
  const pts=[];
  for(let i=0;i<n;i++){
    const ang = shape.rot + i/n*2*Math.PI;
    const rr = R*shape.radii[i];
    pts.push([cx+rr*Math.cos(ang), cy+rr*Math.sin(ang)]);
  }
  // caminho fechado suave (Catmull-Rom -> Bézier)
  ctx.beginPath();
  ctx.moveTo(pts[0][0], pts[0][1]);
  for(let i=0;i<n;i++){
    const p0=pts[(i-1+n)%n], p1=pts[i], p2=pts[(i+1)%n], p3=pts[(i+2)%n];
    const c1x=p1[0]+(p2[0]-p0[0])/6, c1y=p1[1]+(p2[1]-p0[1])/6;
    const c2x=p2[0]-(p3[0]-p1[0])/6, c2y=p2[1]-(p3[1]-p1[1])/6;
    ctx.bezierCurveTo(c1x,c1y,c2x,c2y,p2[0],p2[1]);
  }
  ctx.closePath();
  ctx.fillStyle=`hsl(${shape.hue} ${shape.sat}% ${shape.light}%)`;
  ctx.fill();
  ctx.lineWidth=Math.max(1.5,sizeCss*0.012);
  ctx.strokeStyle=`hsl(${shape.hue} ${shape.sat}% ${Math.max(18,shape.light-28)}%)`;
  ctx.stroke();
  // textura recortada
  if(shape.pattern){
    ctx.save(); ctx.clip();
    ctx.fillStyle=`hsla(${shape.patternHue} 55% 82% / .55)`;
    ctx.strokeStyle=`hsla(${shape.patternHue} 55% 82% / .55)`;
    if(shape.pattern===1){ // pontos
      const step=sizeCss*0.11, r=sizeCss*0.022;
      for(let y=0;y<sizeCss;y+=step) for(let x=0;x<sizeCss;x+=step){
        ctx.beginPath(); ctx.arc(x+ (Math.floor(y/step)%2?step/2:0), y, r, 0, 2*Math.PI); ctx.fill();
      }
    } else { // listras
      ctx.lineWidth=sizeCss*0.03;
      for(let d=-sizeCss;d<sizeCss*2;d+=sizeCss*0.14){
        ctx.beginPath(); ctx.moveTo(d,0); ctx.lineTo(d+sizeCss,sizeCss); ctx.stroke();
      }
    }
    ctx.restore();
  }
  return c;
}

/* ============ estímulos por imagem (banco MST) + fallback procedural ============ */
// STIM.mode: 'image' quando o manifest carrega; 'procedural' como fallback (file:// ou manifest ausente).
let STIM = { mode:'procedural', pairs:null };
const STIM_BASE = 'stimuli/';
async function loadManifest(){
  try{
    const r = await fetch(STIM_BASE+'manifest.json', {cache:'no-cache'});
    if(!r.ok) return;
    const m = await r.json();
    const need = N_ENCODE + CONFIG.nFoils + CONFIG.practiceN;
    if(m && Array.isArray(m.pairs) && m.pairs.length >= need){
      // resolve caminhos relativos ao index.html e valida bins
      const pairs = m.pairs
        .filter(p => p && p.a && p.b && p.bin>=1 && p.bin<=5)
        .map(p => ({ id:p.id, a:STIM_BASE+p.a, b:STIM_BASE+p.b, bin:p.bin }));
      if(pairs.length >= need){ STIM = { mode:'image', pairs }; }
    }
  }catch(e){ /* file:// ou offline sem cache → mantém procedural */ }
}
// spec de estímulo do objeto "oi" na versão de estudo/alvo (imagem a, ou shape procedural)
function objStim(oi){ const o = S.pool[oi]; return STIM.mode==='image' ? {img:o.a} : {shape:o}; }
// particiona o banco em k subconjuntos FIXOS e disjuntos (formas A/B/C paralelas),
// balanceados por bin e determinísticos (ordenados por id, sem aleatoriedade)
function partitionPool(pairs, k){
  const byBin = {1:[],2:[],3:[],4:[],5:[]};
  pairs.forEach(p=>{ if(byBin[p.bin]) byBin[p.bin].push(p); });
  const parts = Array.from({length:k}, ()=> []);
  let t = 0;
  for(const b of [1,2,3,4,5]){
    byBin[b].slice().sort((x,y)=> x.id < y.id ? -1 : 1).forEach(p=>{ parts[t % k].push(p); t++; });
  }
  return parts;
}
// renderiza um spec ({img} ou {shape}) num nó DOM; o tamanho é controlado pelo CSS do contêiner
function renderStim(stim, sizeCss){
  if(stim && stim.img){
    const im = new Image();
    im.decoding = 'async'; im.alt = ''; im.draggable = false; im.src = stim.img;
    return im;
  }
  return renderShape(stim.shape, sizeCss);
}
// pré-carrega uma lista de URLs mostrando progresso (só no modo imagem)
function screenLoading(urls){
  return new Promise(resolve=>{
    const s = scr(); tag('Preparando'); setProg(0,1);
    s.append(el('h2','','Preparando o teste'));
    const p = el('p','','Carregando imagens… 0%'); s.append(p);
    const total = urls.length || 1; let done = 0;
    if(!urls.length){ resolve(); return; }
    urls.forEach(u=>{
      const im = new Image();
      im.onload = im.onerror = ()=>{
        done++; p.textContent = 'Carregando imagens… '+Math.round(100*done/total)+'%';
        setProg(done,total);
        if(done>=total) resolve();
      };
      im.src = u;
    });
  });
}

/* ======================== estado da sessão ======================== */
let S = null;
function buildSession(pid, form, enableRel){
  const seed = (Date.now() ^ Math.floor(Math.random()*1e9)) >>> 0;
  const rnd = mulberry32(seed);

  let pool, targetItems, lureItems, foilIdx, studied, practice;
  const lureBinOf = {};   // objIndex -> bin (para o modo imagem)

  if(STIM.mode === 'image'){
    // ---- modo imagem: pool = partição FIXA do banco por forma (A/B/C disjuntas) ----
    const need = N_ENCODE + CONFIG.nFoils + CONFIG.practiceN;
    const parts = partitionPool(STIM.pairs, 3);
    const fi = Math.max(0, ['A','B','C'].indexOf(form));
    const chosen = parts[fi % parts.length];
    pool = (chosen && chosen.length >= need) ? chosen : STIM.pairs;  // fallback se a partição for pequena demais
    // iscas estratificadas por bin, para cobrir os 5 níveis de similaridade
    const byBin = {1:[],2:[],3:[],4:[],5:[]};
    pool.forEach((p,i)=>{ if(byBin[p.bin]) byBin[p.bin].push(i); });
    for(const b in byBin) byBin[b] = shuffle(byBin[b], rnd);
    const lure = []; const binOrder = shuffle([1,2,3,4,5], rnd); let bi = 0;
    while(lure.length < CONFIG.nLures && bi < 10000){
      const b = binOrder[bi % 5]; bi++;
      if(byBin[b] && byBin[b].length){ const oi = byBin[b].pop(); lure.push(oi); lureBinOf[oi] = b; }
    }
    const used = new Set(lure);
    const rest = shuffle(pool.map((_,i)=>i).filter(i=>!used.has(i)), rnd);
    targetItems = rest.slice(0, CONFIG.nTargets);
    foilIdx     = rest.slice(CONFIG.nTargets, CONFIG.nTargets + CONFIG.nFoils);
    const practiceIdx = rest.slice(CONFIG.nTargets + CONFIG.nFoils, CONFIG.nTargets + CONFIG.nFoils + CONFIG.practiceN);
    lureItems = lure;
    studied   = targetItems.concat(lureItems);
    practice  = practiceIdx.map(i=>({ img: pool[i].a }));
  } else {
    // ---- fallback procedural: shapes gerados + iscas por perturbação ----
    pool = Array.from({length:CONFIG.poolSize}, ()=> makeShape(rnd));
    const idx = shuffle(pool.map((_,i)=>i), rnd);
    studied = idx.slice(0, N_ENCODE);
    targetItems = studied.slice(0, CONFIG.nTargets);
    lureItems   = studied.slice(CONFIG.nTargets, N_ENCODE);
    foilIdx     = idx.slice(N_ENCODE, N_ENCODE + CONFIG.nFoils);
    const binPool = []; const bins=[5,4,3,2,1];
    for(let i=0;i<CONFIG.nLures;i++) binPool.push(bins[i%bins.length]);
    const lureBins = shuffle(binPool, rnd);
    lureItems.forEach((oi,i)=> lureBinOf[oi] = lureBins[i]);
    practice = Array.from({length:CONFIG.practiceN}, ()=> ({ shape: makeShape(rnd) }));
  }

  // célula por item estudado
  const cells  = shuffle(Array.from({length:N_CELLS},(_,i)=>i), rnd).slice(0, studied.length);
  const cellOf = {};
  studied.forEach((oi,k)=> cellOf[oi] = cells[k]);
  const encodeOrder = shuffle(studied, rnd);

  // spec de estímulo (versão estudo/alvo) e da isca
  const encStim  = oi => STIM.mode==='image' ? {img:pool[oi].a} : {shape:pool[oi]};
  const lureStim = oi => STIM.mode==='image'
      ? {img:pool[oi].b}
      : {shape:perturb(pool[oi], CONFIG.binAmount[lureBinOf[oi]], rnd)};

  // trials do teste de item
  const itemTrials = [];
  targetItems.forEach(oi => itemTrials.push({role:'target', objIndex:oi, stim:encStim(oi),  sim_bin:null}));
  lureItems.forEach(oi   => itemTrials.push({role:'lure',   objIndex:oi, stim:lureStim(oi), sim_bin:lureBinOf[oi]}));
  foilIdx.forEach(oi     => itemTrials.push({role:'foil',   objIndex:oi, stim:encStim(oi),  sim_bin:null}));
  const itemOrder = shuffle(itemTrials, rnd);

  // teste objeto-lugar: itens-alvo (idênticos), local conhecido
  const placeOrder = shuffle(targetItems.map(oi=>({objIndex:oi, stim:encStim(oi), trueCell:cellOf[oi]})), rnd);

  // relational (opcional): pares de itens-alvo
  let relTrials = [];
  if(enableRel){
    const tShuf = shuffle(targetItems, rnd);
    for(let i=0;i+1<tShuf.length && relTrials.length<CONFIG.relationalTrials; i+=2){
      const a=tShuf[i], b=tShuf[i+1];
      relTrials.push({a, b, cellA:cellOf[a], cellB:cellOf[b], intact: (relTrials.length%2===0)});
    }
    relTrials = shuffle(relTrials, rnd);
  }

  // URLs a pré-carregar (só no modo imagem)
  let preloadUrls = [];
  if(STIM.mode === 'image'){
    const set = new Set();
    practice.forEach(s=> s.img && set.add(s.img));
    encodeOrder.forEach(oi=> set.add(pool[oi].a));
    itemOrder.forEach(t=> t.stim.img && set.add(t.stim.img));
    placeOrder.forEach(t=> t.stim.img && set.add(t.stim.img));
    preloadUrls = [...set];
  }

  return {
    meta:{ participant_id:pid||('anon-'+uuid().slice(0,8)), session_id:uuid(), form, seed,
           started:new Date().toISOString(), device:deviceInfo(), config:CONFIG,
           enableRelational:enableRel, stimulus_mode:STIM.mode, form_pool_n:pool.length },
    pool, cellOf,
    encodeOrder, itemOrder, placeOrder, relTrials, practice, preloadUrls,
    targetItems, lureItems, foilIdx,
    trials: []   // log bruto por tentativa
  };
}
function deviceInfo(){
  const inp = matchMedia('(pointer:coarse)').matches ? 'touch' : 'mouse';
  return { type: inp==='touch'?'mobile/tablet':'desktop', input:inp,
           viewport:[innerWidth, innerHeight], dpr:window.devicePixelRatio||1, ua:navigator.userAgent };
}
function log(rec){ rec.t = now(); S.trials.push(rec); }
function cellRC(id){ return { c: id % CONFIG.cols, r: Math.floor(id / CONFIG.cols) }; }
function cellDist(a,b){ const A=cellRC(a),B=cellRC(b); return Math.hypot(A.c-B.c, A.r-B.r); }

/* ======================== progresso / UI base ======================== */
let PROG = {done:0, total:1};
function setProg(done,total){ PROG={done,total}; $('bar').style.width = (100*done/total).toFixed(1)+'%'; }
function tag(t){ $('phaseTag').textContent = t||''; }
function scr(){ const s=$('screen'); s.innerHTML=''; s.style.animation='none'; void s.offsetWidth; s.style.animation=''; return s; }

/* ============================ TELAS ============================ */
function screenIntro(){
  tag(''); setProg(0,1);
  const s=scr();
  s.append(el('span','badge','protótipo de pesquisa'));
  const h=el('h1','','DMOL'); s.append(h);
  s.append(el('p','lead','Discriminação Mnêmica de Objeto-em-Lugar'));
  const srcTxt = STIM.mode==='image' ? 'Objetos fotográficos padronizados (banco MST)' : 'Estímulos gerados por computador';
  s.append(el('p','','Teste breve de memória hipocampo-dependente. '+srcTxt+'; ~7–10 minutos.'));

  const f=el('div','fields');
  const l1=el('label','field','Identificação do participante');
  const pid=el('input'); pid.type='text'; pid.placeholder='ex.: P001 (opcional)'; pid.id='pid'; l1.append(pid);
  const l2=el('label','field','Forma (conjunto de estímulos)');
  const sel=el('select'); sel.id='form'; ['A','B','C'].forEach(o=>{const op=el('option',null,o);op.value=o;sel.append(op);}); l2.append(sel);
  const l3=el('label','field check');
  const chk=el('input'); chk.type='checkbox'; chk.id='rel'; l3.append(chk); l3.append(document.createTextNode('Incluir bloco relacional opcional (+1 min)'));
  f.append(l1,l2,l3); s.append(f);

  const b=el('button','btn primary','Começar'); b.style.marginTop='6px';
  b.onclick=async ()=>{
    enterFullscreenSoft();
    S=buildSession(pid.value.trim(), sel.value, chk.checked);
    if(S.preloadUrls && S.preloadUrls.length){ await screenLoading(S.preloadUrls); }
    screenInstructions();
  };
  s.append(b);
  s.append(el('p','note','Ao continuar, os dados ficam apenas neste dispositivo até você exportá-los. Não colete dados identificáveis sem consentimento/aprovação ética.'));
}

function screenInstructions(){
  const s=scr(); tag('Instruções');
  s.append(el('h2','','Como funciona'));
  const ol=el('ol','steps');
  ['Você verá vários objetos, um por vez, cada um numa posição da grade. Diga se cada objeto parece mais arredondado ou mais pontudo.',
   'Depois, uma tarefa rápida de números.',
   'Em seguida, mostraremos objetos e você dirá se é um que já viu, um parecido, ou um novo.',
   'Por fim, alguns objetos voltam e você toca onde eles estavam.'
  ].forEach(t=>ol.append(el('li',null,t)));
  s.append(ol);
  s.append(el('p','','Tente memorizar tanto os objetos quanto onde eles aparecem.'));
  const b=el('button','btn primary','Fazer uma prática');
  b.onclick=()=> runPractice();
  s.append(b);
}

/* ---------- PRÁTICA ---------- */
async function runPractice(){
  tag('Prática');
  for(let i=0;i<S.practice.length;i++){
    setProg(i, S.practice.length);
    await encodeTrial({stim:S.practice[i], cell: (i*7+3)%N_CELLS, practice:true});
  }
  // um mini teste de item + escolha
  const s=scr();
  s.append(el('h2','','Pronto para começar'));
  s.append(el('p','','A prática terminou. A partir de agora não há mais feedback. Memorize os objetos e suas posições.'));
  const b=el('button','btn primary','Iniciar teste');
  b.onclick=()=> phaseEncoding();
  s.append(b);
}

/* ---------- FASE 1: CODIFICAÇÃO ---------- */
function buildScene(clickable, onPick){
  const scene=el('div','scene');
  scene.style.setProperty('--cols',CONFIG.cols);
  scene.style.setProperty('--rows',CONFIG.rows);
  const cells=[];
  for(let i=0;i<N_CELLS;i++){
    const c=el('div','cell'+(clickable?' clickable':''));
    c.dataset.id=i;
    if(clickable){
      c.addEventListener('pointerup',()=>onPick(i,c));
    }
    scene.append(c); cells.push(c);
  }
  return {scene, cells};
}
function encodeTrial({stim, cell, practice, objIndex}){
  return new Promise(async resolve=>{
    const s=scr(); tag(practice?'Prática':'Memorize');
    const {scene,cells}=buildScene(false);
    s.append(scene);
    const img = STIM.mode==='image';
    // julgamento incidental: dentro/fora (canônico do MST) para objetos reais;
    // arredondado/pontudo para os estímulos procedurais abstratos.
    const prompt=el('p','lead', img ? 'Onde você encontraria este objeto?' : 'Arredondado ou pontudo?');
    const row=el('div','btn-row choice-row'); row.style.maxWidth='360px';
    const b1=el('button','btn', img?'Dentro de casa':'Arredondado');
    const b2=el('button','btn', img?'Fora de casa':'Pontudo');
    row.append(b1,b2); s.append(prompt,row);

    // desenha/mostra o objeto na célula
    const node=renderStim(stim, 200);
    cells[cell].append(node);
    const onset=now(); let answered=false, resp=null, rt=null;
    const v1 = img?'indoor':'round', v2 = img?'outdoor':'pointy';
    const pick=(v)=>{ if(answered)return; answered=true; resp=v; rt=now()-onset;
      b1.disabled=b2.disabled=true; (v===v1?b1:b2).classList.add('primary'); };
    b1.onclick=()=>pick(v1); b2.onclick=()=>pick(v2);

    await wait(CONFIG.encodeMs);
    if(!practice){
      const rec={phase:'encoding', objIndex, cell, response:resp,
                 rt: rt!=null?+rt.toFixed(1):null, onset:+onset.toFixed(1)};
      if(!img) rec.roundness = +roundnessOf(stim.shape).toFixed(4);
      log(rec);
    }
    node.remove();
    await wait(CONFIG.isiMs);
    resolve();
  });
}

async function phaseEncoding(){
  tag('Memorize'); 
  const order=S.encodeOrder;
  for(let i=0;i<order.length;i++){
    setProg(i, order.length);
    const oi=order[i];
    await encodeTrial({stim:objStim(oi), cell:S.cellOf[oi], practice:false, objIndex:oi});
  }
  phaseDistractor();
}

/* ---------- FASE 2: DISTRATOR ---------- */
async function phaseDistractor(){
  tag('Números'); 
  const s=scr();
  s.append(el('h2','','Toque no número maior'));
  const row=el('div','num-row'); const nA=el('div','num'), nB=el('div','num'); row.append(nA,nB); s.append(row);
  const sub=el('p','','Continue até a próxima etapa.'); s.append(sub);
  const start=now(); let done=false;
  function nextPair(){
    if(done) return;
    let a=1+Math.floor(Math.random()*9), b=1+Math.floor(Math.random()*9);
    while(b===a) b=1+Math.floor(Math.random()*9);
    nA.textContent=a; nB.textContent=b;
    const onset=now();
    const bigger = a>b ? 'A':'B';
    nA.onpointerup=()=>respond('A'); nB.onpointerup=()=>respond('B');
    function respond(ch){
      const rt=now()-onset;
      log({phase:'distractor', a, b, choice:ch, correct: ch===bigger, rt:+rt.toFixed(1)});
      const pct=clamp((now()-start)/CONFIG.distractorMs,0,1); setProg(pct,1);
      if(now()-start>=CONFIG.distractorMs){ done=true; phaseItem(); }
      else nextPair();
    }
  }
  nextPair();
}

/* ---------- FASE 3: DISCRIMINAÇÃO DE ITEM ---------- */
function itemResponses(){ // map objIndex(target) -> escolha (para BND condicional)
  const m={}; S.trials.filter(t=>t.phase==='item').forEach(t=>{ m[t.objIndex]=t.choice; }); return m;
}
async function phaseItem(){
  tag('Já viu?'); 
  const order=S.itemOrder;
  for(let i=0;i<order.length;i++){
    setProg(i, order.length);
    await itemTrial(order[i]);
    await wait(CONFIG.interTrialMs);
  }
  phasePlace();
}
function itemTrial(tr){
  return new Promise(resolve=>{
    const s=scr(); tag('Já viu?');
    const stage=el('div','obj-stage'); stage.append(renderStim(tr.stim, 220)); s.append(stage);
    s.append(el('p','','Este objeto é…'));
    const row=el('div','btn-row choice-row'); row.style.maxWidth='440px';
    const bOld=el('button','btn','Vi este'), bSim=el('button','btn','Parecido'), bNew=el('button','btn','Novo');
    row.append(bOld,bSim,bNew); s.append(row);
    s.append(el('p','note','Atalhos: 1 = vi este · 2 = parecido · 3 = novo'));
    const onset=now(); let done=false;
    function choose(choice){
      if(done)return; done=true;
      const rt=now()-onset;
      log({phase:'item', role:tr.role, objIndex:tr.objIndex, sim_bin:tr.sim_bin, choice, rt:+rt.toFixed(1), onset:+onset.toFixed(1)});
      document.removeEventListener('keydown',key);
      resolve();
    }
    bOld.onclick=()=>choose('old'); bSim.onclick=()=>choose('similar'); bNew.onclick=()=>choose('new');
    function key(e){ if(e.key==='1')choose('old'); else if(e.key==='2')choose('similar'); else if(e.key==='3')choose('new'); }
    document.addEventListener('keydown',key);
  });
}

/* ---------- FASE 4: OBJETO-LUGAR ---------- */
async function phasePlace(){
  tag('Onde estava?'); 
  const order=S.placeOrder;
  for(let i=0;i<order.length;i++){
    setProg(i, order.length);
    await placeTrial(order[i]);
    await wait(CONFIG.interTrialMs);
  }
  if(S.relTrials.length) phaseRelational();
  else finish();
}
function placeTrial(tr){
  return new Promise(resolve=>{
    const s=scr(); tag('Onde estava?');
    const top=el('div','obj-stage'); top.style.width='min(38vw,150px)'; top.style.height='min(38vw,150px)';
    top.append(renderStim(tr.stim, 150)); s.append(top);
    s.append(el('p','lead','Toque onde este objeto estava'));
    let onset=now(), done=false;
    const {scene}=buildScene(true,(cellId,cellEl)=>{
      if(done)return; done=true;
      scene.querySelectorAll('.cell').forEach(c=>c.classList.remove('picked'));
      cellEl.classList.add('picked');
      const rt=now()-onset;
      const correct = cellId===tr.trueCell;
      log({phase:'object_place', objIndex:tr.objIndex, chosen_cell:cellId, true_cell:tr.trueCell,
           cell_correct:correct, grid_distance:+cellDist(cellId,tr.trueCell).toFixed(3), rt:+rt.toFixed(1)});
      setTimeout(resolve, 220);
    });
    s.append(scene);
    onset=now();
  });
}

/* ---------- FASE 5 (opcional): TROCA RELACIONAL ---------- */
async function phaseRelational(){
  tag('Estava assim?');
  const order=S.relTrials;
  for(let i=0;i<order.length;i++){
    setProg(i, order.length);
    await relTrial(order[i]);
    await wait(CONFIG.interTrialMs);
  }
  finish();
}
function relTrial(tr){
  return new Promise(resolve=>{
    const s=scr(); tag('Estava assim?');
    const {scene,cells}=buildScene(false);
    const posA = tr.intact ? tr.cellA : tr.cellB;
    const posB = tr.intact ? tr.cellB : tr.cellA;
    cells[posA].append(renderStim(objStim(tr.a),200));
    cells[posB].append(renderStim(objStim(tr.b),200));
    s.append(scene);
    s.append(el('p','lead','As posições estão como antes?'));
    const row=el('div','btn-row choice-row'); row.style.maxWidth='360px';
    const bY=el('button','btn','Sim'), bN=el('button','btn','Não'); row.append(bY,bN); s.append(row);
    const onset=now(); let done=false;
    function choose(sayIntact){
      if(done)return; done=true;
      const rt=now()-onset;
      const correct = sayIntact===tr.intact;
      log({phase:'relational', a:tr.a, b:tr.b, intact:tr.intact, response_intact:sayIntact, correct, rt:+rt.toFixed(1)});
      resolve();
    }
    bY.onclick=()=>choose(true); bN.onclick=()=>choose(false);
  });
}

/* ============================ ESCORAGEM ============================ */
function scoreSession(){
  const item = S.trials.filter(t=>t.phase==='item');
  const p = (role,choice)=>{ const sub=item.filter(t=>t.role===role); return sub.length? sub.filter(t=>t.choice===choice).length/sub.length : NaN; };
  const LDI = p('lure','similar') - p('foil','similar');
  const REC = p('target','old') - p('foil','old');

  // LDI por bin
  const binRows=[5,4,3,2,1].map(bin=>{
    const sub=item.filter(t=>t.role==='lure'&&t.sim_bin===bin);
    const pSim = sub.length? sub.filter(t=>t.choice==='similar').length/sub.length : NaN;
    return {bin, n:sub.length, pSim};
  });

  // BND
  const place = S.trials.filter(t=>t.phase==='object_place');
  const BND_exact = place.length? place.filter(t=>t.cell_correct).length/place.length : NaN;
  const BND_error = place.length? place.reduce((a,t)=>a+t.grid_distance,0)/place.length : NaN;
  const itemChoice = itemResponses();
  const recog = place.filter(t=> itemChoice[t.objIndex]==='old');
  const BND_cond = recog.length? recog.filter(t=>t.cell_correct).length/recog.length : NaN;

  // relacional d'
  let relD=null;
  const rel=S.trials.filter(t=>t.phase==='relational');
  if(rel.length){
    const intactT=rel.filter(t=>t.intact), swapT=rel.filter(t=>!t.intact);
    const hit = intactT.length? intactT.filter(t=>t.response_intact).length/intactT.length : NaN; // dizer "sim" quando intacto
    const fa  = swapT.length? swapT.filter(t=>t.response_intact).length/swapT.length : NaN;         // dizer "sim" quando trocado
    const z=x=>{ // aprox. inversa normal (Acklam)
      x=clamp(x, .5/rel.length, 1-.5/rel.length);
      const a=[-3.969683028665376e+01,2.209460984245205e+02,-2.759285104469687e+02,1.383577518672690e+02,-3.066479806614716e+01,2.506628277459239e+00];
      const b=[-5.447609879822406e+01,1.615858368580409e+02,-1.556989798598866e+02,6.680131188771972e+01,-1.328068155288572e+01];
      const c=[-7.784894002430293e-03,-3.223964580411365e-01,-2.400758277161838e+00,-2.549732539343734e+00,4.374664141464968e+00,2.938163982698783e+00];
      const d=[7.784695709041462e-03,3.224671290700398e-01,2.445134137142996e+00,3.754408661907416e+00];
      const pl=0.02425;
      let q,r,ret;
      if(x<pl){q=Math.sqrt(-2*Math.log(x));ret=(((((c[0]*q+c[1])*q+c[2])*q+c[3])*q+c[4])*q+c[5])/((((d[0]*q+d[1])*q+d[2])*q+d[3])*q+1);}
      else if(x<=1-pl){q=x-0.5;r=q*q;ret=(((((a[0]*r+a[1])*r+a[2])*r+a[3])*r+a[4])*r+a[5])*q/(((((b[0]*r+b[1])*r+b[2])*r+b[3])*r+b[4])*r+1);}
      else{q=Math.sqrt(-2*Math.log(1-x));ret=-(((((c[0]*q+c[1])*q+c[2])*q+c[3])*q+c[4])*q+c[5])/((((d[0]*q+d[1])*q+d[2])*q+d[3])*q+1);}
      return ret;
    };
    relD = +(z(hit)-z(fa)).toFixed(3);
  }

  // distrator
  const dis=S.trials.filter(t=>t.phase==='distractor');
  const disAcc = dis.length? dis.filter(t=>t.correct).length/dis.length : NaN;
  const meanRT = arr => arr.length? arr.reduce((a,t)=>a+(t.rt||0),0)/arr.length : NaN;

  return { LDI, REC, binRows, BND_exact, BND_error, BND_cond, relD,
           disAcc, itemRT:meanRT(item), placeRT:meanRT(place),
           nItem:item.length, nPlace:place.length };
}

/* ============================ RESULTADOS ============================ */
function finish(){
  setProg(1,1); tag('Concluído');
  S.meta.finished=new Date().toISOString();
  const r=scoreSession(); S.scores=r;
  const s=scr();
  s.append(el('span','badge','concluído'));
  s.append(el('h2','','Resultados da sessão'));
  const f2=x=> Number.isNaN(x)?'—':(Math.round(x*100)/100).toFixed(2);

  const cards=el('div','cards');
  const card=(k,v,sub)=>{const c=el('div','card'); c.append(el('div','k',k)); c.append(el('div','v',v)); if(sub)c.append(el('div','s',sub)); return c;};
  cards.append(card('LDI', f2(r.LDI), 'separação de padrões'));
  cards.append(card('REC', f2(r.REC), 'reconhecimento de item'));
  cards.append(card('BND exato', f2(r.BND_exact), 'acerto de célula'));
  cards.append(card('BND condicional', f2(r.BND_cond), 'só itens reconhecidos'));
  cards.append(card('Erro de lugar', f2(r.BND_error), 'distância média (células)'));
  cards.append(card(r.relD!=null?'d′ relacional':'Distrator', r.relD!=null? f2(r.relD): f2(r.disAcc), r.relD!=null?'ligação relacional':'acurácia'));
  s.append(cards);

  // LDI por bin
  const tbl=el('table','bins');
  tbl.innerHTML='<tr><th>Bin de similaridade</th><th>1</th><th>2</th><th>3</th><th>4</th><th>5</th></tr>';
  const row=el('tr'); row.append(el('td',null,'p("parecido"|isca)'));
  [1,2,3,4,5].forEach(b=>{ const rr=r.binRows.find(x=>x.bin===b); row.append(el('td',null, rr&&!Number.isNaN(rr.pSim)? rr.pSim.toFixed(2):'—')); });
  tbl.append(row); s.append(tbl);
  s.append(el('p','note','Bin 5 = iscas quase idênticas (mais difíceis). Espera-se p("parecido") caindo do bin 1 ao 5; o ponto de queda estima o limiar de separação.'));

  const btns=el('div','btn-row'); btns.style.marginTop='6px';
  const bJson=el('button','btn primary','Baixar dados (JSON)'); bJson.onclick=()=>downloadJSON();
  const bCsv=el('button','btn','Baixar CSV'); bCsv.onclick=()=>downloadCSV();
  btns.append(bJson,bCsv); s.append(btns);
  const again=el('button','btn ghost','Nova sessão'); again.onclick=()=>screenIntro(); s.append(again);

  s.append(el('p','note','Protótipo com estímulos paramétricos. Cortes/normas dependem de calibração local — estes valores são brutos, sem correção por idade/escolaridade.'));
}

/* ============================ EXPORT ============================ */
function download(name, text, type){
  const blob=new Blob([text],{type}); const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download=name; document.body.append(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url), 1500);
}
function fname(ext){ return `dmol_${S.meta.participant_id}_${S.meta.form}_${S.meta.session_id.slice(0,8)}.${ext}`; }
function downloadJSON(){
  const out={ meta:S.meta, scores:S.scores, trials:S.trials,
              stimuli:{ cellOf:S.cellOf, targetItems:S.targetItems, lureItems:S.lureItems, foilIdx:S.foilIdx, pool:S.pool } };
  download(fname('json'), JSON.stringify(out,null,2), 'application/json');
}
function downloadCSV(){
  const keys=['phase','role','objIndex','sim_bin','choice','response','response_intact','intact','correct','cell','chosen_cell','true_cell','cell_correct','grid_distance','a','b','roundness','rt','onset','t'];
  const head=['participant_id','session_id','form',...keys].join(',');
  const rows=S.trials.map(tr=>{
    const base=[S.meta.participant_id,S.meta.session_id,S.meta.form];
    const vals=keys.map(k=> tr[k]!==undefined? tr[k] : '');
    return base.concat(vals).map(v=> typeof v==='string' && v.includes(',')? `"${v}"`:v).join(',');
  });
  download(fname('csv'), [head,...rows].join('\n'), 'text/csv');
}

/* ============================ util ambiente ============================ */
function enterFullscreenSoft(){ /* opcional: alguns navegadores só permitem via gesto */ try{ if(document.documentElement.requestFullscreen && matchMedia('(pointer:coarse)').matches){ document.documentElement.requestFullscreen().catch(()=>{}); } }catch(e){} }

// registra service worker só quando servido por http(s)
if('serviceWorker' in navigator && location.protocol.startsWith('http')){
  window.addEventListener('load',()=> navigator.serviceWorker.register('sw.js').catch(()=>{}));
}

// evita perda acidental durante o teste
window.addEventListener('beforeunload', e=>{ if(S && S.trials.length && !S.meta.finished){ e.preventDefault(); e.returnValue=''; }});

/* start — tenta carregar o banco de imagens (MST); se falhar, usa estímulos procedurais */
loadManifest().finally(screenIntro);
